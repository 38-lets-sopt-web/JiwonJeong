<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="reset.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <title>지원이의 블로그</title>
</head>

<body>

  <header>
    <div class="profile">
      <img src="./images/icon/icon_profile.jpeg" alt="profile image" />
    </div>
    <div class="title">
      <h1>지원이의 블로그</h1>
      <h2>환영합니다!</h2>
    </div>
    <div class="github">
      <a href="https://github.com/jiwonsudo" target="_blank" rel="noopener noreferrer">
        <img src="./images/icon/icon_github.png" alt="my github link" />
      </a>
    </div>
  </header>

  <div class="main-container">

    <nav>
      <ul>
        <li><a href="#photodump">&#128248; 포토덤프</a></li>
        <li><a href="#gallery">&#128444; 짤 도서관</a></li>
        <li><a href="#favorites">&#128269 관심사</a></li>
        <li><a href="#letter">&#128235; To. 웹왔니</a></li>
      </ul>
    </nav>

    <main>

      <section id="photodump">
        <h1>포토덤프 &#128248;</h1>
        <div class="photos">
          <div class="photobox box-a">
            <img src="./images/photos/dog.jpg" alt="dog with me">
            <div class="photo-overlay">
              <p>개와 함께</p>
            </div>
          </div>
          <div class="photobox box-b">
            <img src="./images/photos/mussa.jpg" alt="working in mussa">
            <div class="photo-overlay">
              <p>멋사 하던 1학년 시절...</p>
            </div>
          </div>
          <div class="photobox box-c">
            <img src="./images/photos/work.jpg" alt="work cart">
            <div class="photo-overlay">
              <p>컴퓨터회사에서 일할때의 사내 이동수단</p>
            </div>
          </div>
          <div class="photobox box-d">
            <img src="./images/photos/aquarium.jpg" alt="aquarium">
            <div class="photo-overlay">
              <p>물멍을 좋아해요</p>
            </div>
          </div>
          <div class="photobox box-e">
            <img src="./images/photos/pizzaselecting.jpg" alt="ordering pizza">
            <div class="photo-overlay">
              <p>이재모피자 맛있어요(부산사람 아님)</p>
            </div>
          </div>
          <div class="photobox box-f">
            <img src="./images/photos/pond.jpg" alt="pond">
            <div class="photo-overlay">
              <p>벌레 안나오는 자연이 좋아요</p>
            </div>
          </div>
        </div>
      </section>

      <section id="gallery">
        <h1>&#128444; 짤 도서관</h1>
        <div class="carousel-container">
          <div class="carousel">
            <div class="slide"><img src="./images/memes/1.jpg" alt=""></div>
            <div class="slide"><img src="./images/memes/2.jpg" alt=""></div>
            <div class="slide"><img src="./images/memes/3.jpg" alt=""></div>
            <div class="slide"><img src="./images/memes/4.jpg" alt=""></div>
            <div class="slide"><img src="./images/memes/5.jpg" alt=""></div>
            <div class="slide"><img src="./images/memes/6.jpg" alt=""></div>

            <div class="slide"><img src="./images/memes/1.jpg" alt=""></div>
            <div class="slide"><img src="./images/memes/2.jpg" alt=""></div>
            <div class="slide"><img src="./images/memes/3.jpg" alt=""></div>
            <div class="slide"><img src="./images/memes/4.jpg" alt=""></div>
            <div class="slide"><img src="./images/memes/5.jpg" alt=""></div>
            <div class="slide"><img src="./images/memes/6.jpg" alt=""></div>
          </div>
        </div>
      </section>

    </main>

  </div>


</body>

</html>
